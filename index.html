    <!-- 開機 splash：inline 樣式，第一 byte 即 paint，遮住 TWA 啟動空窗/白屏，React 掛載後淡出移除 -->
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #05080f;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang TC", "Microsoft JhengHei", sans-serif;
        opacity: 1;
        transition: opacity 0.4s ease;
      }
      #boot-splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      #boot-splash .bs-mark {
        width: 190px;
        height: auto;
        margin-bottom: 1.7rem;
        overflow: visible;
      }
      #boot-splash .bs-line {
        stroke-dasharray: 92 92;
        stroke-dashoffset: 92;
        filter: drop-shadow(0 0 5px rgba(45, 226, 230, 0.7));
        animation: bs-draw 1.15s ease-in-out 0.15s forwards;
      }
      #boot-splash .bs-wheel {
        opacity: 0;
        transform: scale(0.3);
        transform-box: fill-box;
        transform-origin: center;
        filter: drop-shadow(0 0 4px rgba(255, 179, 0, 0.6));
        animation: bs-wheel 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) 1.1s forwards;
      }
      #boot-splash .bs-title {
        opacity: 0;
        transform: translateY(12px);
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        color: #2de2e6;
        text-shadow: 0 0 12px rgba(45, 226, 230, 0.65), 0 0 30px rgba(45, 226, 230, 0.35);
        animation: bs-rise 0.5s ease-out 1.25s forwards;
      }
      #boot-splash .bs-sub {
        opacity: 0;
        margin-top: 0.9rem;
        font-size: 0.82rem;
        letter-spacing: 0.16em;
        color: rgba(255, 255, 255, 0.5);
        animation: bs-fade 0.5s ease-out 1.5s forwards;
      }
      #boot-splash .bs-bar {
        position: absolute;
        bottom: 12%;
        width: 118px;
        height: 3px;
        background: rgba(255, 255, 255, 0.09);
        border-radius: 2px;
        overflow: hidden;
      }
      #boot-splash .bs-bar > i {
        display: block;
        height: 100%;
        width: 0;
        background: #2de2e6;
        border-radius: 2px;
        box-shadow: 0 0 8px rgba(45, 226, 230, 0.7);
        animation: bs-progress 1.7s ease-out 0.2s forwards;
      }
      @keyframes bs-draw { to { stroke-dashoffset: 0; } }
      @keyframes bs-wheel { to { opacity: 1; transform: scale(1); } }
      @keyframes bs-rise { to { opacity: 1; transform: translateY(0); } }
      @keyframes bs-fade { to { opacity: 1; } }
      @keyframes bs-progress { to { width: 100%; } }
    </style>
  </head>
  <body>
    <div id="boot-splash">
      <svg class="bs-mark" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <polyline class="bs-line" points="6,44 18,40 26,46 34,20 44,34 58,14" fill="none" stroke="#2de2e6" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" />
        <circle class="bs-wheel" cx="22" cy="50" r="6" fill="none" stroke="#ffb300" stroke-width="2.5" />
        <circle class="bs-wheel" cx="44" cy="50" r="6" fill="none" stroke="#ffb300" stroke-width="2.5" />
      </svg>
      <div class="bs-title">TAIEX&nbsp;RIDER</div>
      <div class="bs-sub">把台股走勢騎成霓虹賽道</div>
      <div class="bs-bar"><i></i></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
