name: Fetch Daily Map

on:
  schedule:
    - cron: '0 8 * * *'  # 16:00 台灣時間（UTC+8），收盤後 2.5h 資料已備好；
                          # 提早跑 + map_date 錨定交易日，避免 GitHub 延遲跨午夜造成日期錯位
  workflow_dispatch:        # 允許手動觸發測試

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch TAIEX intraday → Supabase daily_map
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/fetchDailyMap.ts
